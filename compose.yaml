services:
  wrapper:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_ARCH: ${TARGET_ARCH:-x86_64}
        BUILD_PLATFORM: ${BUILD_PLATFORM:-linux/amd64}
        RUNTIME_PLATFORM: ${RUNTIME_PLATFORM:-linux/amd64}
    image: wrapper-v2:latest
    container_name: wrapper-v2
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - SYS_CHROOT
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      WRAPPER_USERNAME: ${WRAPPER_USERNAME:-}
      WRAPPER_PASSWORD: ${WRAPPER_PASSWORD:-}
      WRAPPER_APPLE_INIT: ${WRAPPER_APPLE_INIT:-}
      WRAPPER_RUNTIME_TRACE: ${WRAPPER_RUNTIME_TRACE:-}
      WRAPPER_SKIP_PLAYBACK_INIT: ${WRAPPER_SKIP_PLAYBACK_INIT:-}
    volumes:
      # Persist Apple state at the same path shape as the Android app sandbox.
      - ./data:/app/rootfs/data/data/com.apple.android.music/files
