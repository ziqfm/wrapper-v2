name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Fork PRs cannot use repository secrets (APK_URL).
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - arch: arm64-v8a
            runner: ubuntu-latest
            docker_platform: linux/arm64

    env:
      APK_URL: ${{ secrets.APK_URL }}

    steps:
      - uses: actions/checkout@v4

      # linux/arm64 images need binfmt/qemu to execute on GHA amd64 runners (smoke test).
      - name: Set up QEMU
        if: matrix.docker_platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            jq unzip curl ca-certificates

      - name: Make scripts executable
        run: chmod +x tools/extract-libs.sh tools/stage-system.sh

      - name: Sanity check APK_URL secret
        run: |
          if [[ -z "${APK_URL}" ]]; then
            echo "::error::APK_URL secret is not set."
            echo "Maintainers: set APK_URL to a private/local CI URL for a compatible .apk or .apkm."
            exit 1
          fi

      - name: Download Apple Music artifact
        run: |
          mkdir -p .tmp
          artifact=".tmp/apple-music.apk"
          if [[ "${APK_URL,,}" == *.apkm* ]]; then
            artifact=".tmp/apple-music.apkm"
          fi
          curl -fL --retry 3 --retry-delay 2 -o "${artifact}" "${APK_URL}"
          echo "APPLE_MUSIC_ARTIFACT=${artifact}" >> "$GITHUB_ENV"

      - name: Extract Apple native libs
        run: |
          ./tools/extract-libs.sh \
            --bundle "${APPLE_MUSIC_ARTIFACT}" \
            --arch ${{ matrix.arch }}

      - name: Stage Android system binaries
        run: |
          ./tools/stage-system.sh --arch ${{ matrix.arch }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg BUILD_PLATFORM=${{ matrix.docker_platform }} \
            --build-arg RUNTIME_PLATFORM=${{ matrix.docker_platform }} \
            --build-arg TARGET_ARCH=${{ matrix.arch }} \
            -t wrapper-v2:${{ github.sha }} \
            .

      - name: Smoke test (/health)
        run: |
          # No --rm: if the app exits immediately, Docker removes --rm containers
          # and a later docker stop hits "No such container".
          docker rm -f wrapper-smoke 2>/dev/null || true
          # Match compose.yaml: AppArmor default profile can deny mount(2) (urandom
          # bind) even with CAP_SYS_ADMIN; SYS_PTRACE matches production caps.
          docker run -d \
            --platform ${{ matrix.docker_platform }} \
            --name wrapper-smoke \
            --cap-add SYS_ADMIN --cap-add SYS_CHROOT --cap-add SYS_PTRACE \
            --security-opt apparmor=unconfined \
            -p 8080:80 \
            wrapper-v2:${{ github.sha }}
          ok=0
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8080/health >/dev/null; then
              echo "health OK after ${i} attempt(s)"
              ok=1
              break
            fi
            sleep 0.5
          done
          if [[ "$ok" != "1" ]]; then
            echo "::error::health did not become ready in time"
            docker logs wrapper-smoke 2>&1 || true
            docker rm -f wrapper-smoke 2>/dev/null || true
            exit 1
          fi
          curl -sf http://127.0.0.1:8080/health | jq .
          docker rm -f wrapper-smoke

      - name: Save Docker Image to Tarball
        run: |
          mkdir -p .tmp
          docker save wrapper-v2:${{ github.sha }} | gzip > .tmp/wrapper-image-${{ matrix.arch }}.tar.gz

      - name: Upload Finished Image File
        uses: actions/upload-artifact@v4
        with:
          name: compiled-image-${{ matrix.arch }}
          path: .tmp/wrapper-image-${{ matrix.arch }}.tar.gz
          retention-days: 1
